services:
  api-quiz-bank:
    depends_on:
      api-quiz-bank-postgres:
        condition: service_healthy
    environment:
      QUIZBANK_DATABASE_URL: postgresql://${API_QUIZ_BANK_POSTGRES_USER:-api_quiz_bank}:${API_QUIZ_BANK_POSTGRES_PASSWORD:?set API_QUIZ_BANK_POSTGRES_PASSWORD}@api-quiz-bank-postgres:5432/${API_QUIZ_BANK_POSTGRES_DB:-api_quiz_bank}

  api-quiz-bank-postgres:
    image: postgres:16-alpine
    container_name: api-quiz-bank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${API_QUIZ_BANK_POSTGRES_DB:-api_quiz_bank}
      POSTGRES_USER: ${API_QUIZ_BANK_POSTGRES_USER:-api_quiz_bank}
      POSTGRES_PASSWORD: ${API_QUIZ_BANK_POSTGRES_PASSWORD:?set API_QUIZ_BANK_POSTGRES_PASSWORD}
    volumes:
      - api-quiz-bank-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${API_QUIZ_BANK_POSTGRES_USER:-api_quiz_bank} -d ${API_QUIZ_BANK_POSTGRES_DB:-api_quiz_bank}",
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  api-quiz-bank-postgres-data:
