# Generated baseline parser profile for current QuizBank CSV corpus.
parser_profiles:
  - parser_profile_id: csv_quiz_bank_v1
    name: Current QuizBank canonical CSV parser
    format: CSV
    encoding: utf-8-sig
    delimiter: ","
    quotechar: '"'
    header_required: true
    expected_columns:
      - item_id
      - language
      - level_band
      - sublevel
      - theme_id
      - subtheme_id
      - objective_id
      - pattern_id
      - difficulty_band
      - register
      - prompt
      - stem_text
      - options
      - answer_key
      - explanation
      - tags
      - coverage_cell_id
      - status
      - version
      - source_type
      - provenance_note
      - created_at
      - updated_at
      - reviewed_at
      - level_locked
      - locked_at
    canonical_mappings:
      cefr_level: sublevel
      item_status: status
      source_item_id: item_id
    strict_header: true
    default_item_status: draft
