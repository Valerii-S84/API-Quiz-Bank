name: CI

on:
  push:
  pull_request:

jobs:
  repository-invariants:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run no-secrets scan
        run: python3 tools/no_secrets_scan.py

      - name: Run public fixture inventory
        run: |
          echo "Private QuizBank corpus is excluded from public CI by design."
          python3 tools/quizbank_inventory.py --quizbank-dir tests/fixtures/quizbank_public_smoke

      - name: Run public fixture constitution check
        run: |
          echo "Full QuizBank corpus checks are local-only."
          python3 tools/quizbank_constitution_check.py --quizbank-dir tests/fixtures/quizbank_public_smoke

      - name: Install runtime test dependencies
        run: python3 -m pip install -e ".[dev]"

      - name: Check installed dependency metadata
        run: python3 -m pip check

      - name: Run public invariant tests
        run: |
          echo "Private corpus-dependent tests are local-only."
          python3 -m unittest \
            tests.test_contract_schema_invariants \
            tests.test_import_cycle_guard \
            tests.test_import_validation \
            tests.test_mvp_runtime \
            tests.test_mvp_rate_limit \
            tests.test_pre_pilot_runtime_invariants \
            tests.test_database_operations_backup \
            tests.test_legal_privacy_gate \
            tests.test_production_monitor_snapshot \
            tests.test_production_security_hardening \
            tests.test_release_governance_gate \
            tests.test_scale_load_gate \
            tests.test_style_numeric_limits

      - name: Run runtime coverage gate
        run: |
          python3 -m coverage run -m unittest \
            tests.test_database_backend_contract \
            tests.test_admin_content_bank_routes \
            tests.test_content_bank_service_workflow \
            tests.test_mvp_admin \
            tests.test_mvp_coverage_branches \
            tests.test_mvp_projections \
            tests.test_mvp_rate_limit \
            tests.test_mvp_runtime \
            tests.test_mvp_selection_contract \
            tests.test_mvp_selection_decisions \
            tests.test_mvp_selection_policy \
            tests.test_mvp_weighted_selection \
            tests.test_pre_pilot_runtime_invariants \
            tests.test_protected_beta \
            tests.test_protected_beta_recovery \
            tests.test_protected_beta_slot_failures \
            tests.test_telegram_shuffle \
            tests.test_telegram_photo_gate_coverage \
            tests.test_visual_access_gate_coverage \
            tests.test_visual_cache \
            tests.test_visual_delivery \
            tests.test_visual_delivery_image_quality \
            tests.test_visual_prompt_builder \
            tests.test_visual_provider \
            tests.test_visual_qa \
            tests.test_visual_runtime_gate_coverage \
            tests.test_visual_runtime_metadata \
            tests.test_visual_settings \
            tests.test_visual_telegram_delivery \
            tests.test_website_quiz_teaser_beta
          python3 -m coverage report
