name: CI

on:
  push:
  pull_request:

jobs:
  repository-invariants:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run no-secrets scan
        run: python3 tools/no_secrets_scan.py

      - name: Run public fixture inventory
        run: |
          echo "Private QuizBank corpus is excluded from public CI by design."
          python3 tools/quizbank_inventory.py --quizbank-dir tests/fixtures/quizbank_public_smoke

      - name: Run public fixture constitution check
        run: |
          echo "Full QuizBank corpus checks are local-only."
          python3 tools/quizbank_constitution_check.py --quizbank-dir tests/fixtures/quizbank_public_smoke

      - name: Install runtime test dependencies
        run: python3 -m pip install -e ".[dev]"

      - name: Check installed dependency metadata
        run: python3 -m pip check

      - name: Run public invariant tests
        run: |
          echo "Private corpus-dependent tests are local-only."
          python3 -m unittest \
            tests.test_contract_schema_invariants \
            tests.test_import_validation \
            tests.test_mvp_runtime \
            tests.test_mvp_rate_limit \
            tests.test_pre_pilot_runtime_invariants \
            tests.test_database_operations_backup \
            tests.test_legal_privacy_gate \
            tests.test_production_monitor_snapshot \
            tests.test_production_security_hardening \
            tests.test_release_governance_gate \
            tests.test_scale_load_gate \
            tests.test_style_numeric_limits
