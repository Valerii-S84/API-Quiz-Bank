openapi: 3.1.0
info:
  title: API Quiz Bank
  version: 0.1.0
  summary: MVP API contract for governed quiz delivery.
servers:
  - url: http://127.0.0.1:8000
    description: Local MVP API endpoint.
  - url: https://api.valerchik.de
    description: Protected beta route; edge deployments may also require X-API-Key.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return basic service health.
      tags:
        - operations
      responses:
        '200':
          description: Service health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      operationId: getReadiness
      summary: Return local readiness checks.
      tags:
        - operations
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/health:
    get:
      operationId: getV1Health
      summary: Return versioned service health.
      tags:
        - operations
      responses:
        '200':
          description: Service health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/ready:
    get:
      operationId: getV1Readiness
      summary: Return versioned local readiness checks.
      tags:
        - operations
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/levels:
    get:
      operationId: listLevels
      summary: List canonical CEFR levels.
      tags:
        - taxonomy
      responses:
        '200':
          description: Canonical CEFR levels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelListResponse'
  /v1/topics:
    get:
      operationId: listTopics
      summary: List canonical quiz topics.
      tags:
        - taxonomy
      responses:
        '200':
          description: Canonical quiz topics mapped to theme IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicListResponse'
  /v1/quiz-items/next:
    post:
      operationId: getNextQuizItem
      summary: Select and log the next eligible quiz item for a governed consumer.
      tags:
        - quiz-delivery
      parameters:
        - name: X-Consumer-Id
          in: header
          required: true
          schema:
            type: string
            minLength: 1
        - name: X-QuizBank-API-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
        - name: X-QuizBank-Quota-Key
          in: header
          required: false
          description: Required for website_quiz_teaser; optional for shorts_factory_backend and regular server-to-server consumers.
          schema:
            type: string
            minLength: 1
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NextQuizRequest'
      responses:
        '200':
          description: Eligible quiz item projection and delivery log metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextQuizResponse'
        '404':
          description: No eligible quiz item is available.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Missing or invalid consumer-bound API credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Consumer credential is inactive, unauthorized or not entitled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '400':
          description: Missing or invalid scoped quota key for consumers that require per-session quota.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          description: Consumer quota or endpoint rate limit exceeded.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/quiz-items/{item_id}:
    get:
      operationId: getTrustedQuizItemById
      summary: Read an answer-enabled approved or published quiz item for a trusted consumer.
      tags:
        - quiz-delivery
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Consumer-Id
          in: header
          required: true
          schema:
            type: string
            minLength: 1
        - name: X-QuizBank-API-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Answer-enabled quiz item projection for trusted manual quiz_id flow.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrustedQuizItemLookupResponse'
        '401':
          description: Missing or invalid consumer-bound API credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Consumer is not trusted, active or entitled for this item.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Approved or published item is not visible for this trusted lookup.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/deliveries/{delivery_id}:
    get:
      operationId: getDelivery
      summary: Read a consumer-scoped delivery log record.
      tags:
        - quiz-delivery
      parameters:
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Consumer-Id
          in: header
          required: true
          schema:
            type: string
            minLength: 1
        - name: X-QuizBank-API-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Consumer-visible delivery log.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryProjection'
        '401':
          description: Missing or invalid consumer-bound API credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Consumer API key is inactive or consumer is not active.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Delivery is not visible for this consumer.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/deliveries/{delivery_id}/outcome:
    post:
      operationId: recordDeliveryOutcome
      summary: Record sent, failed or cancelled outcome for a trusted consumer delivery.
      tags:
        - quiz-delivery
      parameters:
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Consumer-Id
          in: header
          required: true
          schema:
            type: string
            minLength: 1
        - name: X-QuizBank-API-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryOutcomeRequest'
      responses:
        '200':
          description: Updated consumer-scoped delivery log.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryProjection'
        '401':
          description: Missing or invalid consumer-bound API credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Consumer is not active or trusted for outcome writes.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Delivery is not visible for this consumer.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /admin:
    get:
      operationId: getAdminPanel
      summary: Return the minimal browser shell for governed admin operations.
      tags:
        - admin
      responses:
        '200':
          description: Admin panel HTML shell.
          content:
            text/html:
              schema:
                type: string
  /v1/admin/dashboard:
    get:
      operationId: getAdminDashboard
      summary: Return MVP admin dashboard counts.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
      responses:
        '200':
          description: Admin dashboard counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
        '401':
          description: Missing or invalid admin credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/admin/quiz-items:
    get:
      operationId: listAdminQuizItems
      summary: List admin quiz item projections with controlled filters.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, imported, normalized, needs_review, approved, published, monitored, retired, blocked]
        - name: cefr_level
          in: query
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1, C2]
        - name: theme_id
          in: query
          schema:
            type: string
            pattern: '^T(0[1-9]|1[0-8])$'
        - name: source_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Admin quiz item list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminQuizItemListResponse'
        '401':
          description: Missing or invalid admin credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/admin/quiz-items/{item_id}:
    get:
      operationId: getAdminQuizItem
      summary: Read one admin quiz item projection.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - name: item_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Admin quiz item projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminQuizItemProjection'
        '404':
          description: Quiz item not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/admin/quiz-items/{item_id}/approve:
    post:
      operationId: approveAdminQuizItem
      summary: Approve a quiz item through the audited admin workflow.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminItemId'
      requestBody:
        $ref: '#/components/requestBodies/AdminStatusChange'
      responses:
        '200':
          $ref: '#/components/responses/AdminStatusChangeOk'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '409':
          $ref: '#/components/responses/AdminInvalidTransition'
  /v1/admin/quiz-items/{item_id}/publish:
    post:
      operationId: publishAdminQuizItem
      summary: Publish a quiz item through the audited admin workflow.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminItemId'
      requestBody:
        $ref: '#/components/requestBodies/AdminStatusChange'
      responses:
        '200':
          $ref: '#/components/responses/AdminStatusChangeOk'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '409':
          $ref: '#/components/responses/AdminInvalidTransition'
  /v1/admin/quiz-items/{item_id}/retire:
    post:
      operationId: retireAdminQuizItem
      summary: Retire a quiz item through the audited admin workflow.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminItemId'
      requestBody:
        $ref: '#/components/requestBodies/AdminStatusChange'
      responses:
        '200':
          $ref: '#/components/responses/AdminStatusChangeOk'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '409':
          $ref: '#/components/responses/AdminInvalidTransition'
  /v1/admin/quiz-items/{item_id}/block:
    post:
      operationId: blockAdminQuizItem
      summary: Block a quiz item through the audited admin workflow.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminItemId'
      requestBody:
        $ref: '#/components/requestBodies/AdminStatusChange'
      responses:
        '200':
          $ref: '#/components/responses/AdminStatusChangeOk'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '409':
          $ref: '#/components/responses/AdminInvalidTransition'
  /v1/admin/audit-log:
    get:
      operationId: listAdminAuditLog
      summary: List recent audit events for admin review.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Recent audit events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          description: Missing or invalid admin credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/admin/consumers:
    get:
      operationId: listAdminConsumers
      summary: List consumers, channels and bots with usage counts.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Admin consumer list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConsumerListResponse'
    post:
      operationId: createAdminConsumer
      summary: Create consumer, channel or bot access as owner.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminConsumerCreateRequest'
      responses:
        '200':
          description: Created consumer access.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConsumerProjection'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /v1/admin/consumers/{consumer_id}/visual-settings:
    get:
      operationId: getAdminConsumerVisualSettings
      summary: Read owner-only visual delivery settings for a consumer.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminConsumerId'
      responses:
        '200':
          description: Consumer visual settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVisualSettingsProjection'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          description: Consumer not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
    patch:
      operationId: patchAdminConsumerVisualSettings
      summary: Update admin-only visual delivery settings as owner.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminConsumerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminVisualSettingsPatchRequest'
      responses:
        '200':
          description: Updated visual settings with audit evidence.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVisualSettingsUpdateResponse'
        '403':
          $ref: '#/components/responses/AdminForbidden'
        '404':
          description: Consumer not found.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          description: Visual settings payload is invalid.
          content:
            application/json:
              schema:
                type: object
  /v1/admin/consumers/{consumer_id}/suspend:
    post:
      operationId: suspendAdminConsumer
      summary: Suspend consumer, channel or bot access as owner.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminConsumerId'
      requestBody:
        $ref: '#/components/requestBodies/AdminStatusChange'
      responses:
        '200':
          description: Updated consumer status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConsumerProjection'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /v1/admin/consumers/{consumer_id}/activate:
    post:
      operationId: activateAdminConsumer
      summary: Reactivate consumer, channel or bot access as owner.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminConsumerId'
      requestBody:
        $ref: '#/components/requestBodies/AdminStatusChange'
      responses:
        '200':
          description: Updated consumer status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConsumerProjection'
        '403':
          $ref: '#/components/responses/AdminForbidden'
  /v1/admin/consumers/{consumer_id}/block:
    post:
      operationId: blockAdminConsumer
      summary: Block consumer, channel or bot access as owner.
      tags:
        - admin
      parameters:
        - $ref: '#/components/parameters/AdminKeyHeader'
        - $ref: '#/components/parameters/AdminConsumerId'
      requestBody:
        $ref: '#/components/requestBodies/AdminStatusChange'
      responses:
        '200':
          description: Updated consumer status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminConsumerProjection'
        '403':
          $ref: '#/components/responses/AdminForbidden'
components:
  parameters:
    AdminKeyHeader:
      name: X-QuizBank-Admin-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
    AdminItemId:
      name: item_id
      in: path
      required: true
      schema:
        type: string
    AdminConsumerId:
      name: consumer_id
      in: path
      required: true
      schema:
        type: string
  requestBodies:
    AdminStatusChange:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminStatusChangeRequest'
  responses:
    AdminStatusChangeOk:
      description: Audited admin status change result.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminStatusChangeResponse'
    AdminForbidden:
      description: Admin role cannot perform this action.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    AdminInvalidTransition:
      description: Requested status transition is invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        version:
          type: string
    ReadyResponse:
      type: object
      additionalProperties: false
      required: [status, checks]
      properties:
        status:
          type: string
          const: ok
        checks:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [name, status]
            properties:
              name:
                type: string
              status:
                type: string
    LevelListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LevelProjection'
    LevelProjection:
      type: object
      additionalProperties: false
      required: [cefr_level, order_index, status]
      properties:
        cefr_level:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        order_index:
          type: integer
          minimum: 1
        status:
          type: string
          const: active
    TopicListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TopicProjection'
    TopicProjection:
      type: object
      additionalProperties: false
      required: [topic_id, theme_id, title, status]
      properties:
        topic_id:
          type: string
          pattern: '^T(0[1-9]|1[0-8])$'
        theme_id:
          type: string
          pattern: '^T(0[1-9]|1[0-8])$'
        title:
          type: string
        status:
          type: string
          const: active
    NextQuizRequest:
      type: object
      additionalProperties: false
      required:
        - consumer_id
      properties:
        consumer_id:
          type: string
          minLength: 1
        language_code:
          type: string
          enum: [de, en, fr, es, nl]
          default: de
        content_bank_id:
          type: string
          minLength: 1
        bank_version_id:
          type: string
          minLength: 1
        cefr_level:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        theme_ids:
          type: array
          items:
            type: string
            pattern: '^T(0[1-9]|1[0-8])$'
        objective_ids:
          type: array
          items:
            type: string
            pattern: '^O(0[1-9]|1[0-6])$'
        pattern_ids:
          type: array
          items:
            type: string
            pattern: '^P(0[1-9]|1[0-2])$'
    QuizItemPublicProjection:
      type: object
      additionalProperties: false
      required:
        - id
        - public_id
        - language
        - language_code
        - content_bank_id
        - bank_version_id
        - question
        - options
        - cefr_level
        - theme
        - objective
        - pattern
        - status
        - metadata
      properties:
        id:
          type: string
        public_id:
          type: string
        language:
          type: string
          enum: [de, en, fr, es, nl]
        language_code:
          type: string
          enum: [de, en, fr, es, nl]
        content_bank_id:
          type: string
        bank_version_id:
          type: string
        question:
          type: object
          additionalProperties: false
          required: [text, prompt, stem]
          properties:
            text:
              type: string
            prompt:
              type: string
            stem:
              type: string
        options:
          type: array
          minItems: 2
          maxItems: 10
          items:
            type: object
            additionalProperties: false
            required: [id, position, text]
            properties:
              id:
                type: string
              position:
                type: integer
                minimum: 1
              text:
                type: string
        cefr_level:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        theme:
          type: object
          additionalProperties: false
          required: [title, slug]
          properties:
            title:
              type: string
            slug:
              type: string
        objective:
          type: object
          additionalProperties: false
          required: [title]
          properties:
            title:
              type: string
        pattern:
          type: object
          additionalProperties: false
          required: [title]
          properties:
            title:
              type: string
        status:
          type: string
          enum: [approved, published]
        metadata:
          type: object
          additionalProperties: false
          required: [display]
          properties:
            display:
              type: object
              additionalProperties: false
              required:
                - cefr_level
                - theme_title
                - theme_slug
                - objective_title
                - pattern_title
              properties:
                cefr_level:
                  type: string
                theme_title:
                  type: string
                theme_slug:
                  type: string
                objective_title:
                  type: string
                pattern_title:
                  type: string
    QuizItemAnswerFeedback:
      type: object
      additionalProperties: false
