openapi: 3.1.0
info:
  title: API Quiz Bank
  version: 0.1.0
  summary: MVP API contract for governed quiz delivery.
servers:
  - url: http://127.0.0.1:8000
    description: Local MVP API endpoint.
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return basic service health.
      tags:
        - operations
      responses:
        '200':
          description: Service health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      operationId: getReadiness
      summary: Return local readiness checks.
      tags:
        - operations
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/health:
    get:
      operationId: getV1Health
      summary: Return versioned service health.
      tags:
        - operations
      responses:
        '200':
          description: Service health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/ready:
    get:
      operationId: getV1Readiness
      summary: Return versioned local readiness checks.
      tags:
        - operations
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/levels:
    get:
      operationId: listLevels
      summary: List canonical CEFR levels.
      tags:
        - taxonomy
      responses:
        '200':
          description: Canonical CEFR levels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelListResponse'
  /v1/topics:
    get:
      operationId: listTopics
      summary: List canonical quiz topics.
      tags:
        - taxonomy
      responses:
        '200':
          description: Canonical quiz topics mapped to theme IDs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicListResponse'
  /v1/quiz-items/next:
    post:
      operationId: getNextQuizItem
      summary: Select and log the next eligible quiz item for a governed consumer.
      tags:
        - quiz-delivery
      parameters:
        - name: X-Consumer-Id
          in: header
          required: true
          schema:
            type: string
            minLength: 1
        - name: X-QuizBank-API-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NextQuizRequest'
      responses:
        '200':
          description: Eligible quiz item projection and delivery log metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextQuizResponse'
        '404':
          description: No eligible quiz item is available.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '401':
          description: Missing or invalid consumer-bound API credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Consumer credential is inactive, unauthorized or not entitled.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          description: Consumer quota exceeded.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /v1/deliveries/{delivery_id}:
    get:
      operationId: getDelivery
      summary: Read a consumer-scoped delivery log record.
      tags:
        - quiz-delivery
      parameters:
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
        - name: X-Consumer-Id
          in: header
          required: true
          schema:
            type: string
            minLength: 1
        - name: X-QuizBank-API-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Consumer-visible delivery log.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryProjection'
        '401':
          description: Missing or invalid consumer-bound API credentials.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Consumer API key is inactive or consumer is not active.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '404':
          description: Delivery is not visible for this consumer.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
components:
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        version:
          type: string
    ReadyResponse:
      type: object
      additionalProperties: false
      required: [status, checks]
      properties:
        status:
          type: string
          const: ok
        checks:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [name, status]
            properties:
              name:
                type: string
              status:
                type: string
    LevelListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LevelProjection'
    LevelProjection:
      type: object
      additionalProperties: false
      required: [cefr_level, order_index, status]
      properties:
        cefr_level:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        order_index:
          type: integer
          minimum: 1
        status:
          type: string
          const: active
    TopicListResponse:
      type: object
      additionalProperties: false
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TopicProjection'
    TopicProjection:
      type: object
      additionalProperties: false
      required: [topic_id, theme_id, title, status]
      properties:
        topic_id:
          type: string
          pattern: '^T(0[1-9]|1[0-8])$'
        theme_id:
          type: string
          pattern: '^T(0[1-9]|1[0-8])$'
        title:
          type: string
        status:
          type: string
          const: active
    NextQuizRequest:
      type: object
      additionalProperties: false
      required:
        - consumer_id
      properties:
        consumer_id:
          type: string
          minLength: 1
        cefr_level:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        theme_ids:
          type: array
          items:
            type: string
            pattern: '^T(0[1-9]|1[0-8])$'
        objective_ids:
          type: array
          items:
            type: string
            pattern: '^O(0[1-9]|1[0-6])$'
        pattern_ids:
          type: array
          items:
            type: string
            pattern: '^P(0[1-9]|1[0-2])$'
    QuizItemPublicProjection:
      type: object
      additionalProperties: false
      required:
        - id
        - public_id
        - language
        - question
        - options
        - cefr_level
        - theme
        - objective
        - pattern
        - metadata
      properties:
        id:
          type: string
        public_id:
          type: string
        language:
          type: string
          const: de
        question:
          type: object
          additionalProperties: false
          required: [text, prompt, stem]
          properties:
            text:
              type: string
            prompt:
              type: string
            stem:
              type: string
        options:
          type: array
          minItems: 2
          maxItems: 10
          items:
            type: object
            additionalProperties: false
            required: [id, position, text]
            properties:
              id:
                type: string
              position:
                type: integer
                minimum: 1
              text:
                type: string
        cefr_level:
          type: string
          enum: [A1, A2, B1, B2, C1, C2]
        theme:
          type: object
          additionalProperties: false
          required: [title, slug]
          properties:
            title:
              type: string
            slug:
              type: string
        objective:
          type: object
          additionalProperties: false
          required: [title]
          properties:
            title:
              type: string
        pattern:
          type: object
          additionalProperties: false
          required: [title]
          properties:
            title:
              type: string
        metadata:
          type: object
          additionalProperties: false
          required: [display]
          properties:
            display:
              type: object
              additionalProperties: false
              required:
                - cefr_level
                - theme_title
                - theme_slug
                - objective_title
                - pattern_title
              properties:
                cefr_level:
                  type: string
                theme_title:
                  type: string
                theme_slug:
                  type: string
                objective_title:
                  type: string
                pattern_title:
                  type: string
    ProblemDetails:
      type: object
      additionalProperties: true
      required: [type, title, status, reason_code]
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        reason_code:
          type: string
    SourceTraceability:
      type: object
      additionalProperties: false
      required: [source_id, source_type, provenance_note]
      properties:
        source_id:
          type: string
        source_type:
          type: string
        provenance_note:
          type: string
    DeliveryProjection:
      type: object
      additionalProperties: false
      required:
        - delivery_id
        - consumer_id
        - quiz_item_id
        - item_status
        - status
        - selected_at
        - reason
      properties:
        delivery_id:
          type: string
        consumer_id:
          type: string
        quiz_item_id:
          type: string
        item_status:
          type: string
          enum: [approved, published]
        status:
          type: string
          enum: [created, reserved, delivered, sent, failed, skipped, expired, cancelled]
        selected_at:
          type: string
        reason:
          type: string
    NextQuizResponse:
      type: object
      additionalProperties: false
      required:
        - delivery_id
        - consumer_id
        - quiz_item
        - delivery
        - interaction
        - selection
      properties:
        delivery_id:
          type: string
        consumer_id:
          type: string
        quiz_item:
          $ref: '#/components/schemas/QuizItemPublicProjection'
        delivery:
          $ref: '#/components/schemas/DeliveryProjection'
        interaction:
          type: object
          additionalProperties: false
          required: [mode, answer_key_included]
          properties:
            mode:
              type: string
            answer_key_included:
              type: boolean
              const: false
        selection:
          type: object
          additionalProperties: false
          required: [entitlement_checked, quota_checked, repeat_policy_applied, decision]
          properties:
            entitlement_checked:
              type: boolean
            quota_checked:
              type: boolean
            repeat_policy_applied:
              type: boolean
            decision:
              $ref: '#/components/schemas/SelectionDecisionMetadata'
    SelectionDecisionMetadata:
      type: object
      additionalProperties: false
      required:
        - selection_request_id
        - candidate_count
        - eligible_count
        - selected_reason
        - selected_score
        - blocked_reason_counts
        - fallback_reason_code
      properties:
        selection_request_id:
          type: string
        candidate_count:
          type: integer
          minimum: 0
        eligible_count:
          type: integer
          minimum: 0
        selected_reason:
          type: string
        selected_score:
          type: object
          additionalProperties:
            type: number
        blocked_reason_counts:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        fallback_reason_code:
          type:
            - string
            - 'null'
